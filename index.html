<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Number!</title>
    <style>
        /* ==========================================
           кё°ліё м„Өм • л°Ҹ k ліҖмҲҳ мҙҲкё°нҷ”
           ========================================== */
        :root {
            --k: 1px;
        }

        body {
            margin: 0; padding: 0;
            background-color: #333; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            font-family: 'Malgun Gothic', 'л§‘мқҖ кі л”•', sans-serif;
            font-size: calc(var(--k) * 0.35); 
        }

        #app-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: flex-start; 
            background-color: #333; overflow: hidden; width: 100%;
        }

        #app-container {
            width: calc(var(--k) * 16);
            height: calc(var(--k) * 9);
            background-color: #f5f5f5;
            display: grid;
            grid-template-columns: calc(var(--k) * 3.5) calc(var(--k) * 10.1) calc(var(--k) * 2.4);
            overflow: hidden; box-sizing: border-box;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }

        /* ==========================================
           мўҢмёЎ л©”лүҙ мҳҒм—ӯ
           ========================================== */
        #menu-frame {
            background-color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: calc(var(--k) * 0.1) 0 calc(var(--k) * 0.3) rgba(0,0,0,0.1);
            z-index: 10;
        }

        .menu-logo {
            width: calc(var(--k) * 3.9325); margin-bottom: calc(var(--k) * 0.32);
            object-fit: contain; 
        }

        .menu-btn {
            width: calc(var(--k) * 2.8); padding: calc(var(--k) * 0.27) calc(var(--k) * 0.3);
            margin: calc(var(--k) * 0.15) 0; font-size: calc(var(--k) * 0.28); 
            font-weight: bold; background-color: #e0e0e0; border: none;
            border-radius: calc(var(--k) * 0.2); cursor: pointer;
        }

        .menu-btn.completed { background-color: #A0E8AF; color: black; }

        /* ==========================================
           мӨ‘м•ҷ кІҢмһ„ мҳҒм—ӯ
           ========================================== */
        #game-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: calc(var(--k) * 0.5); box-sizing: border-box; position: relative;
        }

        .options-bar {
            display: flex; gap: calc(var(--k) * 0.3); margin-bottom: 0;
            align-items: center; font-weight: bold; font-size: calc(var(--k) * 0.135); 
        }
        .options-bar label { display: flex; align-items: center; cursor: pointer; }
        .options-bar input[type="checkbox"], .options-bar input[type="radio"] {
            width: calc(var(--k) * 0.16); height: calc(var(--k) * 0.16);
            margin: 0 calc(var(--k) * 0.05) 0 0; cursor: pointer;
        }

        .question-text {
            font-size: calc(var(--k) * 0.525); font-weight: bold;
            margin-bottom: 0; text-align: center; cursor: pointer;
        }

        .items-tray {
            display: flex; gap: calc(var(--k) * 0.2); margin-top: 0;
            background: rgba(255, 255, 255, 0.7); padding: calc(var(--k) * 0.2); border-radius: calc(var(--k) * 0.3);
        }

        .draggable-item {
            width: calc(var(--k) * 0.54); height: calc(var(--k) * 0.54);
            cursor: pointer; transition: transform 0.1s;
            object-fit: contain; 
        }
        .draggable-item:active { transform: scale(0.9); }

        #drop-zone {
            width: calc(var(--k) * 6.6); height: calc(var(--k) * 4.4);
            border-radius: calc(var(--k) * 0.4); position: relative;
            display: flex; flex-wrap: wrap-reverse; align-content: flex-start;
            padding: calc(var(--k) * 0.5); gap: calc(var(--k) * 0.2);
            cursor: pointer; 
        }

        .placed-item {
            width: calc(var(--k) * 0.54); height: calc(var(--k) * 0.54);
            position: absolute; transition: all 0.2s ease-out;
            object-fit: contain;
            pointer-events: none; 
        }

        .red-border {
            position: absolute;
            width: calc(var(--k) * 1.45); height: calc(var(--k) * 3.35); 
            border: calc(var(--k) * 0.05) solid red; border-radius: calc(var(--k) * 0.1);
            pointer-events: none; box-sizing: border-box; z-index: 5;
        }

        #count-display {
            position: absolute;
            font-size: calc(var(--k) * 0.45);
            font-weight: bold;
            color: #ff3333; 
            text-shadow: calc(var(--k)*0.03) calc(var(--k)*0.03) 0 #fff,
                         calc(var(--k)*-0.03) calc(var(--k)*-0.03) 0 #fff,
                         calc(var(--k)*0.03) calc(var(--k)*-0.03) 0 #fff,
                         calc(var(--k)*-0.03) calc(var(--k)*0.03) 0 #fff;
            z-index: 10;
            pointer-events: none;
            transform: translateX(-50%); 
            transition: all 0.15s ease-out; 
        }

        .submit-btn {
            padding: calc(var(--k) * 0.1) calc(var(--k) * 0.4); font-size: calc(var(--k) * 0.35); 
            font-weight: bold; background-color: #FFD700; border: none;
            border-radius: calc(var(--k) * 0.15); margin-top: 0; cursor: pointer;
        }

        /* ==========================================
           мҡ°мёЎ л°°л„Ҳ мҳҒм—ӯ
           ========================================== */
        #banner-area {
            padding: calc(var(--k) * 0.5) calc(var(--k) * 0.5) calc(var(--k) * 0.5) 0;
            box-sizing: border-box; display: flex; align-items: center; 
        }

        #banner-frame {
            display: none; width: 100%; height: 70%; background-color: #D2B48C;
            border: calc(var(--k) * 0.1) solid #8B4513; border-radius: calc(var(--k) * 0.2);
            display: grid; grid-template-columns: repeat(2, 1fr); justify-items: center;
            align-content: flex-start; gap: calc(var(--k) * 0.1);
            padding: calc(var(--k) * 0.2); box-sizing: border-box; overflow-y: auto;
        }

        .banner-item {
            width: calc(var(--k) * 0.54); height: calc(var(--k) * 0.54);
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="app-container">
            <div id="menu-frame">
                <img src="images/лЎңкі .png" alt="Let's Number Logo" class="menu-logo" onerror="this.src=''">
                <button class="menu-btn" onclick="startGame('мҲ«мһҗ м„ёкё° лҶҖмқҙ')">мҲ«мһҗ м„ёкё° лҶҖмқҙ</button>
                <button class="menu-btn" onclick="startGame('лҚ”н•ҳкё° лҶҖмқҙ')">лҚ”н•ҳкё° лҶҖмқҙ</button>
                <button class="menu-btn" onclick="startGame('л№јкё° лҶҖмқҙ')">л№јкё° лҶҖмқҙ</button>
                <button class="menu-btn" onclick="startGame('кіұн•ҳкё° лҶҖмқҙ')">кіұн•ҳкё° лҶҖмқҙ</button>
                <button class="menu-btn" onclick="startGame('мӢңкі„ ліҙкё° лҶҖмқҙ')">мӢңкі„ ліҙкё° лҶҖмқҙ</button>
            </div>

            <div id="game-area">
                <h1 style="color: #888; text-align: center; font-size: calc(var(--k) * 0.6);">мҷјмӘҪм—җм„ң л©”лүҙлҘј м„ нғқн•ҳм„ёмҡ”.</h1>
            </div>
            
            <div id="banner-area">
                <div id="banner-frame"></div>
            </div>
        </div>
    </div>

    <audio id="bgm-player" loop>
        <source src="sounds_basic/bgm.wav" type="audio/wav">
    </audio>

<script>
    function calculateLayout() {
        const availableWidth = window.innerWidth;
        const availableHeight = window.innerHeight;
        const appWrapper = document.getElementById('app-wrapper');
        
        if (availableHeight > availableWidth) {
            appWrapper.style.alignItems = 'center';
        } else {
            appWrapper.style.alignItems = 'flex-start';
        }
        
        let k = Math.floor(Math.min(availableWidth / 16, availableHeight / 9));
        k = Math.max(1, k); 
        document.documentElement.style.setProperty('--k', `${k}px`);
    }

    window.addEventListener('resize', calculateLayout);
    calculateLayout();

    const items = ['лӢЁм¶”', 'л”ёкё°', 'лё”лЎқ', 'л№—', 'л№ө', 'мҲҳл°•', 'мҲҹк°ҖлқҪ', 'м—°н•„', 'мһҗлҸҷм°Ё', 'м№«мҶ”'];
    const solvedItems = { 'мҲ«мһҗ м„ёкё° лҶҖмқҙ': [], 'лҚ”н•ҳкё° лҶҖмқҙ': [], 'л№јкё° лҶҖмқҙ': [], 'кіұн•ҳкё° лҶҖмқҙ': [], 'мӢңкі„ ліҙкё° лҶҖмқҙ': [] };

    let currentGame = null;

    // ==========================================
    // [лҚ”н•ҳкё° лҶҖмқҙмҡ© м „мҡ© мғҒнғң ліҖмҲҳ]
    // ==========================================
    let add_n1 = 0;                  // мҷјмӘҪ мҲ«мһҗ
    let add_n2 = 0;                  // мҳӨлҘёмӘҪ мҲ«мһҗ
    let leftItems = [];              // мҷјмӘҪ л°°м№ҳ м•„мқҙн…ң лҰ¬мҠӨнҠё (DOM мҡ”мҶҢ)
    let rightItems = [];             // мҳӨлҘёмӘҪ л°°м№ҳ м•„мқҙн…ң лҰ¬мҠӨнҠё (DOM мҡ”мҶҢ)
    let isAnimating = false;         // м• лӢҲл©”мқҙм…ҳ мһ¬мғқ мғҒнғң
    let isHardMode = false;          // н•ҳл“ңлӘЁл“ң(нһҢнҠё л№„нҷңм„ұнҷ”) мғҒнғң
    let hiddenCarryMode = false;     // нһҲл“  м»Өл§Ёл“ң(99) мҳ¬лҰј лӘЁл“ң мғҒнғң
    let isAnswered = false;          // м •лӢө м ңм¶ң м—¬л¶Җ
    
    let targetItem = "";
    let targetNumber = 0;
    let placedItemsCount = 0;
    
    let soundType = "кі мң м–ҙ"; 
    let soundEnabled = true;
    let showNumberStatus = true; 

    let currentAudio = new Audio();

    function playSound(fileName) {
        currentAudio.pause();
        currentAudio.onended = null; 
        const isNumberSound = /^\d+(\[кі мң м–ҙ\])?\.wav$/.test(fileName);
        const folder = isNumberSound ? 'sounds_number/' : 'sounds_basic/';
        currentAudio.src = folder + fileName;
        currentAudio.play().catch(e => console.log("Audio error:", e));
    }

    function playSoundSequence(fileNames) {
        if (fileNames.length === 0) return;
        playSound(fileNames[0]);
        currentAudio.onended = () => { playSoundSequence(fileNames.slice(1)); };
    }

    document.body.addEventListener('click', () => {
        const bgm = document.getElementById('bgm-player');
        if (bgm.paused) bgm.play().catch(e => console.log("BGM error", e));
    }, { once: true });

    function startGame(gameName) {
        currentGame = gameName;
        document.getElementById('banner-frame').style.display = 'grid';
        updateBanner();

        if (gameName === 'мҲ«мһҗ м„ёкё° лҶҖмқҙ') {
            initCountingGame();
        } else if (gameName === 'лҚ”н•ҳкё° лҶҖмқҙ') {
            initAdditionGame(); // лҚ”н•ҳкё° лҶҖмқҙ мӢңмһ‘!
        } else {
            document.getElementById('game-area').innerHTML = `<h1 style="color: #888; font-size: calc(var(--k) * 0.7);">${gameName} м—…лҚ°мқҙнҠё мӨҖл№„ мӨ‘мһ…лӢҲлӢӨ!</h1>`;
        }
    }

    function initCountingGame() {
        const availableItems = items.filter(i => !solvedItems['мҲ«мһҗ м„ёкё° лҶҖмқҙ'].includes(i));
        if (availableItems.length === 0) return showCompletionScreen('мҲ«мһҗ м„ёкё° лҶҖмқҙ');
        
        targetItem = availableItems[Math.floor(Math.random() * availableItems.length)];
        targetNumber = Math.floor(Math.random() * 20) + 1;
        placedItemsCount = 0;

        document.getElementById('game-area').innerHTML = `
            <div class="options-bar">
                <label><input type="checkbox" checked onchange="soundEnabled = this.checked"> мҲҳ м„ёлҠ” мҶҢлҰ¬</label>
                <label><input type="radio" name="sndType" value="кі мң м–ҙ" checked onchange="soundType = this.value"> кі мң м–ҙ</label>
                <label><input type="radio" name="sndType" value="н•ңмһҗм–ҙ" onchange="soundType = this.value"> н•ңмһҗм–ҙ</label>
                <label><input type="checkbox" checked onchange="showNumberStatus = this.checked; updateCountDisplay();"> мҲҳ мғҒнғң ліҙмқҙкё°</label>
            </div>
            <div class="question-text" onclick="replayQuestion()">${targetItem} ${targetNumber}к°ң мӨ„лһҳ?</div>
            <div id="drop-zone" style="background-image: url('images/мҲ«мһҗм„ёкё°.png'); background-size: contain; background-position: center bottom; background-repeat: no-repeat; border: none;"></div>
            <div class="items-tray">
                ${availableItems.map(item => `<img src="images/${item}.png" class="draggable-item" onclick="placeItem('${item}')" onerror="this.src=''">`).join('')}
            </div>
            <button class="submit-btn" onclick="checkCountingAnswer()">м „лӢ¬</button>
        `;

        const dropZone = document.getElementById('drop-zone');
        dropZone.onclick = removeLastItem;
        dropZone.oncontextmenu = removeLastItem;

        playSoundSequence([`${targetItem}.wav`, `${targetNumber}к°ңмӨ„лһҳ.wav`]);
    }

    function removeLastItem(e) {
        if(e) e.preventDefault(); 
        
        const dropZone = document.getElementById('drop-zone');
        const itemsInZone = dropZone.querySelectorAll('.placed-item');
        
        if(itemsInZone.length > 0) {
            const lastItem = itemsInZone[itemsInZone.length - 1];
            dropZone.removeChild(lastItem);
            placedItemsCount--;
            updateRedBorders(); 
            updateCountDisplay();
        }
    }

    function updateRedBorders() {
        const dropZone = document.getElementById('drop-zone');
        dropZone.querySelectorAll('.red-border').forEach(e => e.remove());

        if (placedItemsCount >= 10) {
            const border1 = document.createElement('div');
            border1.className = 'red-border';
            border1.style.left = 'calc(50% - calc(var(--k) * 1.475))'; 
            border1.style.bottom = 'calc(var(--k) * 0.3)'; 
            dropZone.appendChild(border1);
        }
        
        if (placedItemsCount >= 20) {
            const border2 = document.createElement('div');
            border2.className = 'red-border';
            border2.style.left = 'calc(50% + calc(var(--k) * 0.025))'; 
            border2.style.bottom = 'calc(var(--k) * 0.3)';
            dropZone.appendChild(border2);
        }
    }

    function updateCountDisplay() {
        let countDisplay = document.getElementById('count-display');
        const dropZone = document.getElementById('drop-zone');

        if (!countDisplay) {
            countDisplay = document.createElement('div');
            countDisplay.id = 'count-display';
            dropZone.appendChild(countDisplay);
        }

        if (!showNumberStatus || placedItemsCount === 0) {
            countDisplay.style.display = 'none';
            return;
        }

        countDisplay.style.display = 'block';
        countDisplay.innerText = placedItemsCount;

        const index = placedItemsCount - 1; 
        const col = Math.floor(index / 5); 
        const row = index % 5;             

        const baseLeft = `calc(50% - calc(var(--k) * 1.395) + calc(var(--k) * 0.75 * ${col}))`;
        countDisplay.style.left = `calc(${baseLeft} + calc(var(--k) * 0.27))`;
        countDisplay.style.bottom = `calc(var(--k) * 0.4 + var(--k) * 0.65 * ${row} + calc(var(--k) * 0.55))`;
    }

    function placeItem(itemName) {
        if (placedItemsCount >= 20 || itemName !== targetItem) return;
        
        placedItemsCount++;
        const img = document.createElement('img');
        img.src = `images/${itemName}.png`;
        img.className = 'placed-item';
        
        const index = placedItemsCount - 1; 
        const col = Math.floor(index / 5); 
        const row = index % 5;             

        img.style.left = `calc(50% - calc(var(--k) * 1.395) + calc(var(--k) * 0.75 * ${col}))`;
        img.style.bottom = `calc(var(--k) * 0.4 + var(--k) * 0.65 * ${row})`;

        document.getElementById('drop-zone').appendChild(img);
        
        updateRedBorders();
        updateCountDisplay();
        
        if (soundEnabled) {
            let soundFileName = soundType === "кі мң м–ҙ" ? `${placedItemsCount}[кі мң м–ҙ].wav` : `${placedItemsCount}.wav`;
            playSound(soundFileName);
        }
    }

    function replayQuestion() { playSoundSequence([`${targetItem}.wav`, `${targetNumber}к°ңмӨ„лһҳ.wav`]); }

    function checkCountingAnswer() {
        const dropZoneItems = document.querySelectorAll('.placed-item'); 
        let isCorrect = (dropZoneItems.length === targetNumber);
        
        if (isCorrect) {
            playSound('кі л§ҲмӣҢ.wav');
            const dropZone = document.getElementById('drop-zone');
            dropZone.style.backgroundImage = "url('images/мҲ«мһҗм„ёкё°кі л§ҲмӣҢ.png')";

            const countDisplay = document.getElementById('count-display');
            if(countDisplay) countDisplay.style.display = 'none';
            dropZone.querySelectorAll('.red-border').forEach(e => e.style.display = 'none');

            solvedItems['мҲ«мһҗ м„ёкё° лҶҖмқҙ'].push(targetItem);
            updateBanner();
            setTimeout(initCountingGame, 2000);
        } else {
            playSound('лӢӨмӢңн•ҙліҙмһҗ.wav');
            document.querySelector('.question-text').innerText = "лӢӨмӢң н•ҙліҙмһҗ.";
            setTimeout(() => {
                document.querySelector('.question-text').innerText = `${targetItem} ${targetNumber}к°ң мӨ„лһҳ?`;
                const dropZone = document.getElementById('drop-zone');
                dropZone.querySelectorAll('.placed-item, .red-border, #count-display').forEach(e => e.remove());
                placedItemsCount = 0;
            }, 2000);
        }
    }

    function updateBanner() {
        const banner = document.getElementById('banner-frame');
        banner.innerHTML = '';
        (solvedItems[currentGame] || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'banner-item';
            div.style.backgroundImage = `url('images/${item}.png')`;
            banner.appendChild(div);
        });
    }

    // [мҲҳм •лҗЁ] мҲ«мһҗ м„ёкё° лҶҖмқҙ мҷ„лЈҢ мӢң, н…ҚмҠӨнҠё лҢҖмӢ  мҷ„лЈҢ мқҙлҜём§ҖлҘј н‘ңмӢңн•©лӢҲлӢӨ.
    function showCompletionScreen(gameName) {
        if (gameName === 'мҲ«мһҗ м„ёкё° лҶҖмқҙ') {
            document.getElementById('game-area').innerHTML = `
                <img src="images/мҲ«мһҗм„ёкё°мҷ„лЈҢ.png" style="width: calc(var(--k) * 8); height: calc(var(--k) * 6); object-fit: contain;" alt="мҷ„лЈҢ">
            `;
        } else {
            document.getElementById('game-area').innerHTML = `
                <h1 style="font-size: calc(var(--k) * 1); color: black; margin-bottom: calc(var(--k) * 0.2);">лӢӨ н–Ҳм–ҙ. кі л§ҲмӣҢ!</h1>
                <p style="font-size: calc(var(--k) * 0.6); color: blue; font-weight: bold; margin-top: 0;">рҹҺү ${gameName} л§ҲмҠӨн„°! рҹҺү</p>
            `;
        }
        
        playSound('лӢӨн–Ҳм–ҙкі л§ҲмӣҢ.wav');
        document.querySelectorAll('.menu-btn').forEach(btn => { if(btn.innerText.includes(gameName)) btn.classList.add('completed'); });
    }

    // =========================================================================
    // [лҚ”н•ҳкё° лҶҖмқҙ л©”мқё лЎңм§Ғ л°Ҹ н—¬нҚј л©”м„ңл“ң лӘЁмқҢ]
    // =========================================================================
    function initAdditionGame() {
        const availableItems = items.filter(i => !solvedItems['лҚ”н•ҳкё° лҶҖмқҙ'].includes(i));
        if (availableItems.length === 0) return showCompletionScreen('лҚ”н•ҳкё° лҶҖмқҙ');
        
        targetItem = availableItems[Math.floor(Math.random() * availableItems.length)];
        isAnswered = false;
        isAnimating = false;
        leftItems = [];
        rightItems = [];
        
        // н•ҳл“ң лӘЁл“ң мІҙнҒ¬ (лӮЁмқҖ м•„мқҙн…ңмқҙ 3к°ң мқҙн•ҳмқј л•Ң)
        isHardMode = solvedItems['лҚ”н•ҳкё° лҶҖмқҙ'].length >= (items.length - 3);

        // нһҲл“  лӘЁл“ң(мҳ¬лҰј л¬ём ң) м—¬л¶Җм—җ л”°лҘё м¶ңм ң лЎңм§Ғ
        let validPairs = [];
        if (hiddenCarryMode) {
            for (let a = 1; a < 10; a++) {
                for (let b = 1; b < 10; b++) {
                    if (a + b > 10) validPairs.push([a, b]);
                }
            }
        } else {
            for (let a = 1; a < 20; a++) {
                for (let b = 1; b <= 20 - a; b++) {
                    validPairs.push([a, b]);
                }
            }
        }
        
        const pair = validPairs[Math.floor(Math.random() * validPairs.length)];
        add_n1 = pair[0];
        add_n2 = pair[1];

        // лҚ”н•ҳкё° лҶҖмқҙмҡ© нҷ”л©ҙ UI к·ёлҰ¬кё°
        document.getElementById('game-area').innerHTML = `
            <div style="display: flex; width: 100%; height: 100%; box-sizing: border-box; padding: calc(var(--k) * 0.2);">
                <!-- мәҗлҰӯн„° мҳҒм—ӯ (мўҢмёЎ) -->
                <div style="width: calc(var(--k) * 3); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: calc(var(--k) * 1.5);">
                    <div id="add-speech" style="font-size: calc(var(--k) * 0.35); font-weight: bold; text-align: center; margin-bottom: calc(var(--k) * 0.3);">
                        лӘЁл‘җ лҚ”н•ҙм„ң<br>лӘҮ к°ңмқём§Җ<br>м•Ңл ӨмӨ„лһҳ?
                    </div>
                    <img id="add-char" src="images/м…ҲлҶҖмқҙ.png" onerror="this.src=''" style="width: calc(var(--k) * 2.5); object-fit: contain;">
                </div>
                
                <!-- ліҙл“ң мҳҒм—ӯ (мҡ°мёЎ) -->
                <div style="flex: 1; display: flex; flex-direction: column; position: relative; margin-left: calc(var(--k) * 0.5);">
                    <!-- мғҒлӢЁ м•ҲлӮҙ л°Ҹ нһҢнҠё л°” -->
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 calc(var(--k) * 0.5); height: calc(var(--k) * 1);">
                        <div id="add-instruction" style="font-size: calc(var(--k) * 0.3); font-weight: bold; color: ${isHardMode ? 'red' : '#888'};">
                            ${isHardMode ? "рҹ’Ў мқҙм ң лЁёлҰҝмҶҚмңјлЎңл§Ң кі„мӮ°н•ҙм„ң м •лӢөмқ„ м Ғм–ҙліҙм„ёмҡ”!" : "рҹ’Ў 'нһҢнҠё ліҙкё°' лІ„нҠјмқ„ лҲҢлҹ¬ліҙм„ёмҡ”!"}
                        </div>
                        ${isHardMode ? 
                            `<div style="font-size: calc(var(--k) * 0.25); font-weight: bold; color: red;">рҹ’Ә мҠӨмҠӨлЎң н•ҙліҙмһҗ!</div>` : 
                            `<button id="hint-btn" onclick="showAdditionHint()" style="font-size: calc(var(--k) * 0.25); font-weight: bold; padding: calc(var(--k) * 0.1) calc(var(--k) * 0.2); cursor: pointer; background-color: #87CEEB; border: none; border-radius: calc(var(--k)*0.1);">рҹ’Ў нһҢнҠё ліҙкё°</button>`
                        }
                    </div>
                    
                    <!-- мә”лІ„мҠӨ(м•„мқҙн…ң мҳҒм—ӯ) -->
                    <div id="add-canvas" style="flex: 1; position: relative; background: white; border: calc(var(--k) * 0.05) solid #ccc; border-radius: calc(var(--k) * 0.2); overflow: hidden;">
                        <!-- лҚ”н•ҳкё° кё°нҳё (+) -->
                        <div style="position: absolute; left: 50%; top: 35%; transform: translate(-50%, -50%); font-size: calc(var(--k) * 1.5); font-weight: bold;">+</div>
                    </div>
                    
                    <!-- мҲҳмӢқ л°Ҹ мһ…л Ҙ мҳҒм—ӯ -->
                    <div style="height: calc(var(--k) * 2); display: flex; justify-content: center; align-items: center; gap: calc(var(--k) * 0.2);">
                        <div style="font-size: calc(var(--k) * 0.7); font-weight: bold;">${add_n1} + ${add_n2} = </div>
                        <input type="number" id="add-input" style="width: calc(var(--k) * 1.5); font-size: calc(var(--k) * 0.7); font-weight: bold; text-align: center; background-color: #FFFACD; border: calc(var(--k)*0.05) solid #ccc; border-radius: calc(var(--k)*0.1);" onkeypress="if(event.key==='Enter') checkAdditionAnswer()">
                        <button onclick="checkAdditionAnswer()" style="font-size: calc(var(--k) * 0.4); font-weight: bold; padding: calc(var(--k) * 0.1) calc(var(--k) * 0.3); background-color: #FFD700; border: none; border-radius: calc(var(--k)*0.1); cursor: pointer;">нҷ•мқё</button>
                    </div>
                </div>
            </div>
        `;

        const canvas = document.getElementById('add-canvas');
        
        // м•„мқҙн…ң DOM мғқм„ұ н•ЁмҲҳ
        const createItem = (arr) => {
            let img = document.createElement('img');
            img.src = `images/${targetItem}.png`;
            img.className = 'placed-item';
            img.style.transition = 'all 0.5s ease-in-out'; // м• лӢҲл©”мқҙм…ҳмқ„ мң„н•ң нҠёлһңм§Җм…ҳ
            canvas.appendChild(img);
            arr.push(img);
        };

        for(let i = 0; i < add_n1; i++) createItem(leftItems);
        for(let i = 0; i < add_n2; i++) createItem(rightItems);

        rearrangeAdditionItems();
        updateAdditionBorders();
        evaluateHintButtonState();

        document.getElementById('add-input').focus();
        playSound('лӘЁл‘җлҚ”н•ҙм„ңлӘҮк°ңмқём§Җм•Ңл ӨмӨ„лһҳ.wav');
    }

    function rearrangeAdditionItems() {
        const startX1 = 0.5; // мҷјмӘҪ к·ёлЈ№ X мӢңмһ‘ мң„м№ҳ
        const startX2 = 4.2; // мҳӨлҘёмӘҪ к·ёлЈ№ X мӢңмһ‘ мң„м№ҳ
        const startY = 0.5;  // Y мӢңмһ‘ мң„м№ҳ

        leftItems.forEach((img, i) => {
            const col = Math.floor(i / 5);
            const row = i % 5;
            img.style.left = `calc(var(--k) * ${startX1 + col * 0.75})`;
            img.style.top = `calc(var(--k) * ${startY + row * 0.75})`;
        });

        rightItems.forEach((img, i) => {
            const col = Math.floor(i / 5);
            const row = i % 5;
            img.style.left = `calc(var(--k) * ${startX2 + col * 0.75})`;
            img.style.top = `calc(var(--k) * ${startY + row * 0.75})`;
        });
    }

    function updateAdditionBorders(previewLeft = null, previewRight = null) {
        const canvas = document.getElementById('add-canvas');
        if (!canvas) return;
        
        canvas.querySelectorAll('.add-border').forEach(e => e.remove());

        const lCount = previewLeft !== null ? previewLeft : leftItems.length;
        const rCount = previewRight !== null ? previewRight : rightItems.length;

        const startX1 = 0.5;
        const startX2 = 4.2;
        const startY = 0.5;

        const createBorder = (x, y) => {
            const border = document.createElement('div');
            border.className = 'add-border red-border'; // кё°мЎҙ red-border мҠӨнғҖмқј мһ¬нҷңмҡ©
            border.style.left = `calc(var(--k) * ${x - 0.2})`;
            border.style.top = `calc(var(--k) * ${y - 0.2})`;
            // кё°мЎҙ .red-borderк°Җ absoluteм—җ width/heightк°Җ кі м •лҗҳм–ҙ мһҲмңјлҜҖлЎң м—¬кё°м„ң лҚ®м–ҙм”ҢмӣҒлӢҲлӢӨ.
            border.style.width = `calc(var(--k) * 1.5)`;
            border.style.height = `calc(var(--k) * 3.9)`;
            canvas.appendChild(border);
        };

        if (lCount >= 10) createBorder(startX1, startY);
        if (lCount === 20) createBorder(startX1 + 1.5, startY);
        if (rCount >= 10) createBorder(startX2, startY);
        if (rCount === 20) createBorder(startX2 + 1.5, startY);
    }

    function evaluateHintButtonState() {
        const hintBtn = document.getElementById('hint-btn');
        const instLabel = document.getElementById('add-instruction');
        if (!hintBtn) return;

        if (isHardMode || isAnimating) {
            hintBtn.disabled = true;
            hintBtn.style.backgroundColor = '#e0e0e0';
            return;
        }

        const lCount = leftItems.length;
        const rCount = rightItems.length;
        const totalCount = lCount + rCount;
        
        if (lCount >= 10 || rCount >= 10 || lCount === 0 || rCount === 0 || totalCount <= 10) {
            hintBtn.disabled = true;
            hintBtn.style.backgroundColor = '#e0e0e0';
            if (instLabel) instLabel.innerText = "рҹ’Ў м •лӢөмқ„ кі„мӮ°н•ҙм„ң м•„лһҳм—җ м Ғм–ҙліҙм„ёмҡ”!";
        } else {
            hintBtn.disabled = false;
            hintBtn.style.backgroundColor = '#87CEEB';
            if (instLabel) instLabel.innerText = "рҹ’Ў 'нһҢнҠё ліҙкё°' лІ„нҠјмқ„ лҲҢлҹ¬ліҙм„ёмҡ”!";
        }
    }

    function showAdditionHint() {
        if (isAnswered || isAnimating) return;

        const lCount = leftItems.length;
        const rCount = rightItems.length;
        
        if (lCount >= 10 || rCount >= 10 || lCount === 0 || rCount === 0 || (lCount + rCount) <= 10) return;

        isAnimating = true;
        evaluateHintButtonState();

        const isSpecialCase = (lCount===6 && rCount===6) || (lCount===6 && rCount===7) || (lCount===6 && rCount===8) || (lCount===7 && rCount===6) || (lCount===7 && rCount===7) || (lCount===8 && rCount===6);

        let srcList, tgtList, moveAmt;
        if (lCount < rCount) {
            srcList = leftItems; tgtList = rightItems; moveAmt = 10 - rCount;
        } else {
            srcList = rightItems; tgtList = leftItems; moveAmt = 10 - lCount;
        }

        moveAmt = Math.min(moveAmt, srcList.length);
        let itemsToMove = isSpecialCase ? srcList.slice(0, moveAmt) : srcList.slice(-moveAmt);
        const isLeftTarget = (tgtList === leftItems);
        
        const startX_tgt = isLeftTarget ? 0.5 : 4.2;
        const startY = 0.5;

        // м•„мқҙн…ң мқҙлҸҷ мӢңмһ‘ (м• лӢҲл©”мқҙм…ҳ м Ғмҡ©)
        itemsToMove.forEach((img, i) => {
            const targetIdx = tgtList.length + i;
            const col = Math.floor(targetIdx / 5);
            const row = targetIdx % 5;
            
            img.dataset.origLeft = img.style.left;
            img.dataset.origTop = img.style.top;
            
            img.style.left = `calc(var(--k) * ${startX_tgt + col * 0.75})`;
            img.style.top = `calc(var(--k) * ${startY + row * 0.75})`;
        });

        // м• лӢҲл©”мқҙм…ҳ лҸ„лӢ¬ нӣ„ лЎңм§Ғ мІҳлҰ¬ (CSS transition мӢңк°„ кі л Ө)
        setTimeout(() => {
            if (isAnswered) return;
            let previewLeft = lCount + (isLeftTarget ? moveAmt : -moveAmt);
            let previewRight = rCount + (isLeftTarget ? -moveAmt : moveAmt);
            updateAdditionBorders(previewLeft, previewRight);

            // 2мҙҲ нӣ„ м ңмһҗлҰ¬лЎң ліөк·Җ
            setTimeout(() => {
                if (isAnswered) return;
                updateAdditionBorders(); 
                
                itemsToMove.forEach(img => {
                    img.style.left = img.dataset.origLeft;
                    img.style.top = img.dataset.origTop;
                });

                // м ңмһҗлҰ¬ ліөк·Җ мҷ„лЈҢ нӣ„ мғҒнғң мҙҲкё°нҷ”
                setTimeout(() => {
                    isAnimating = false;
                    evaluateHintButtonState();
                }, 500); 
            }, 2000);
        }, 500); 
    }

    function checkAdditionAnswer() {
        if (isAnswered) return;
        const inputEl = document.getElementById('add-input');
        const userInput = inputEl.value.trim();

        // нһҲл“  м»Өл§Ёл“ң '99' мһ…л Ҙ мІҳлҰ¬
        if (userInput === '99') {
            hiddenCarryMode = !hiddenCarryMode;
            playSound('1.wav'); // нһҲл“  мӮ¬мҡҙл“ң лҢҖмҡ©
            inputEl.value = '';
            initAdditionGame();
            return;
        }

        if (userInput === '') return;

        if (parseInt(userInput) === (add_n1 + add_n2)) {
            isAnswered = true;
            
            const charImg = document.getElementById('add-char');
            if(charImg) charImg.src = 'images/м…ҲлҶҖмқҙкі л§ҲмӣҢ.png';
            
            const speech = document.getElementById('add-speech');
            if(speech) speech.innerHTML = "кі л§ҲмӣҢ!";

            solvedItems['лҚ”н•ҳкё° лҶҖмқҙ'].push(targetItem);
            updateBanner();

            if (solvedItems['лҚ”н•ҳкё° лҶҖмқҙ'].length === items.length) {
                playSound('лӢӨн–Ҳм–ҙкі л§ҲмӣҢ.wav');
                setTimeout(() => showCompletionScreen('лҚ”н•ҳкё° лҶҖмқҙ'), 2000);
            } else {
                playSound('кі л§ҲмӣҢ.wav');
                setTimeout(initAdditionGame, 2000);
            }
        } else {
            const speech = document.getElementById('add-speech');
            if(speech) speech.innerHTML = "лӢӨмӢң<br>н•ҙліҙмһҗ.";
            playSound('лӢӨмӢңн•ҙліҙмһҗ.wav');
            
            inputEl.value = '';
            inputEl.focus();
            
            setTimeout(restoreAddQuestionText, 2000);
        }
    }

    function restoreAddQuestionText() {
        if (!isAnswered) {
            const speech = document.getElementById('add-speech');
            if(speech) speech.innerHTML = "лӘЁл‘җ лҚ”н•ҙм„ң<br>лӘҮ к°ңмқём§Җ<br>м•Ңл ӨмӨ„лһҳ?";
            
            const charImg = document.getElementById('add-char');
            if(charImg) charImg.src = 'images/м…ҲлҶҖмқҙ.png';
            
            playSound('лӘЁл‘җлҚ”н•ҙм„ңлӘҮк°ңмқём§Җм•Ңл ӨмӨ„лһҳ.wav');
        }
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            const appContainer = document.getElementById('app-container');
            if (appContainer) {
                appContainer.style.display = 'none';
                void appContainer.offsetHeight;
                appContainer.style.display = 'grid';
            }
        }, 250);
    });
</script>

</body>
