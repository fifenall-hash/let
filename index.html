<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Number!</title>
    <style>
        /* 1. 기본 브라우저 여백 제거 및 세로 분할 레이아웃 */
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        /* 2. 게임 화면이 위치할 상단 래퍼 영역 */
        #app-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
            overflow: hidden;
            width: 100%;
        }

        /* 3. 16:9 메인 컨테이너 (컨테이너 쿼리 적용) */
        #app-container {
            container-type: inline-size;
            width: 100%;
            height: 100%;
            max-width: min(100vw, calc(85vh * (16 / 9)));
            max-height: min(85vh, calc(100vw * (9 / 16)));
            aspect-ratio: 16 / 9;
            background-color: #f5f5f5;
            
            display: grid;
            grid-template-columns: 22% 58% 20%;
            
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* 4. 모바일 하단 툴바 가림 방지 (안전 영역) */
        #bottom-safe-area {
            height: 15vh;
            min-height: 90px; 
            width: 100%;
            background-color: #000;
        }

        /* ---------------------------------------------------
           [수정됨] 5. 좌측 메뉴 영역 (가로 모드 잘림 방지)
        --------------------------------------------------- */
        #menu-frame {
            width: 100%;
            height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; /* 요소들을 세로로 균등하게 배치합니다. */
            padding: 2cqh 0; /* 여백을 높이(cqh) 기준으로 설정합니다. */
            box-shadow: 0.2cqw 0 0.5cqw rgba(0,0,0,0.1);
            z-index: 10;
            overflow-y: auto; /* 극단적으로 화면이 작을 때 메뉴 영역만 스크롤 되도록 허용합니다. */
        }

        .menu-logo {
            width: 70%;
            margin-bottom: 2cqh;
            object-fit: contain;
        }

        .menu-btn {
            width: 85%;
            padding: 2cqh; /* 버튼 내부 여백을 높이 기준으로 변경 */
            margin: 0.5cqh 0; /* 버튼 간격을 높이 기준으로 변경 */
            font-size: 3cqh; /* 글자 크기를 화면 높이에 반응하도록 변경 */
            font-weight: bold;
            background-color: #e0e0e0;
            border: none;
            border-radius: 1.5cqh;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .menu-btn.completed {
            background-color: #A0E8AF;
            color: black;
        }

        /* ---------------------------------------------------
           6. 중앙 인게임 영역 & 우측 트레이
        --------------------------------------------------- */
        #game-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2cqw;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        #banner-area {
            width: 100%;
            height: 100%;
            padding: 2cqw 2cqw 2cqw 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        #banner-frame {
            width: 100%;
            height: 100%;
            background-color: #D2B48C;
            border: 0.5cqw solid #8B4513;
            border-radius: 1cqw;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 1cqw;
            box-sizing: border-box;
        }

        .banner-item {
            width: 40%;
            aspect-ratio: 1;
            margin: 5%;
            background-size: cover;
        }

        /* ---------------------------------------------------
           7. 게임 내부 동적 요소 스타일
        --------------------------------------------------- */
        .question-text {
            font-size: 2.5cqw;
            font-weight: bold;
            margin-bottom: 2cqw;
            text-align: center;
            cursor: pointer;
        }

        .items-tray {
            display: flex;
            gap: 1cqw;
            margin-top: 2cqw;
            background: rgba(255, 255, 255, 0.7);
            padding: 1cqw;
            border-radius: 1.5cqw;
        }

        .draggable-item {
            width: 6cqw;
            height: 6cqw;
            cursor: pointer;
        }

        #drop-zone {
            width: 60%;
            height: 50%;
            border: 0.3cqw dashed #ccc;
            border-radius: 2cqw;
            position: relative;
            display: flex;
            flex-wrap: wrap-reverse;
            align-content: flex-start;
            padding: 1cqw;
            gap: 1cqw;
        }

        .placed-item {
            width: 6cqw;
            height: 6cqw;
            position: relative;
        }

        .submit-btn {
            padding: 1cqw 3cqw;
            font-size: 2cqw;
            font-weight: bold;
            background-color: #FFD700;
            border: none;
            border-radius: 1.5cqw;
            margin-top: 2cqw;
            cursor: pointer;
        }

        .options-bar {
            display: flex;
            gap: 1.5cqw;
            margin-bottom: 1.5cqw;
            align-items: center;
            font-weight: bold;
            font-size: 1.2cqw;
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="app-container">
            
            <div id="menu-frame">
                <img src="images/로고.png" alt="Let's Number Logo" class="menu-logo" onerror="this.src=''">
                <button class="menu-btn" onclick="startGame('숫자 세기 놀이')">숫자 세기 놀이</button>
                <button class="menu-btn" onclick="startGame('더하기 놀이')">더하기 놀이</button>
                <button class="menu-btn" onclick="startGame('빼기 놀이')">빼기 놀이</button>
                <button class="menu-btn" onclick="startGame('곱하기 놀이')">곱하기 놀이</button>
                <button class="menu-btn" onclick="startGame('시계 보기 놀이')">시계 보기 놀이</button>
            </div>

            <div id="game-area">
                <h1 style="color: #888; font-size: 3cqw; text-align: center;">왼쪽에서 메뉴를 선택하세요.</h1>
            </div>
            
            <div id="banner-area">
                <div id="banner-frame"></div>
            </div>

        </div>
    </div>

    <!-- 하단 안전 영역 -->
    <div id="bottom-safe-area"></div>

    <!-- 배경음악 -->
    <audio id="bgm-player" loop>
        <source src="sounds_basic/bgm.wav" type="audio/wav">
    </audio>

<script>
    // ==========================================
    // 1. 게임 상태 및 데이터 초기화
    // ==========================================
    const items = ['단추', '딸기', '블록', '빗', '빵', '수박', '숟가락', '연필', '자동차', '칫솔'];
    const solvedItems = {
        '숫자 세기 놀이': [],
        '더하기 놀이': [],
        '빼기 놀이': [],
        '곱하기 놀이': [],
        '시계 보기 놀이': []
    };

    let currentGame = null;
    let targetItem = "";
    let targetNumber = 0;
    let placedItemsCount = 0;

    let soundType = "고유어"; 
    let soundEnabled = true;

    const koreanNumbers = {1: "하나", 2: "둘", 3: "셋", 4: "넷", 5: "다섯", 6: "여섯", 7: "일곱", 8: "여덟", 9: "아홉", 10: "열", 11: "열하나", 12: "열둘", 13: "열셋", 14: "열넷", 15: "열다섯", 16: "열여섯", 17: "열일곱", 18: "열여덟", 19: "열아홉", 20: "스물"};
    const sinoNumbers = {1: "일", 2: "이", 3: "삼", 4: "사", 5: "오", 6: "육", 7: "칠", 8: "팔", 9: "구", 10: "십", 11: "십일", 12: "십이", 13: "십삼", 14: "십사", 15: "십오", 16: "십육", 17: "십칠", 18: "십팔", 19: "십구", 20: "이십"};

    // ==========================================
    // 2. 오디오 매핑 시스템
    // ==========================================
    let currentAudio = null;
    function playSound(fileName) {
        if (currentAudio) currentAudio.pause();
        
        const isNumberSound = /^\d+/.test(fileName) || /\[고유어\]/.test(fileName);
        const folder = isNumberSound ? 'sounds_number/' : 'sounds_basic/';
        
        currentAudio = new Audio(folder + fileName);
        currentAudio.play().catch(e => console.log("Audio play failed:", e));
        return currentAudio;
    }

    function playSoundSequence(fileNames) {
        if (fileNames.length === 0) return;
        const audio = playSound(fileNames[0]);
        audio.onended = () => {
            playSoundSequence(fileNames.slice(1));
        };
    }

    document.body.addEventListener('click', () => {
        const bgm = document.getElementById('bgm-player');
        if (bgm.paused) bgm.play().catch(e => console.log("BGM play error", e));
    }, { once: true });

    // ==========================================
    // 3. 메인 게임 로직
    // ==========================================
    function startGame(gameName) {
        currentGame = gameName;
        updateBanner();

        if (gameName === '숫자 세기 놀이') {
            initCountingGame();
        } else {
            document.getElementById('game-area').innerHTML = `
                <h1 style="color: #888; font-size: 3cqw;">${gameName} 업데이트 준비 중입니다!</h1>
            `;
        }
    }

    function initCountingGame() {
        const availableItems = items.filter(i => !solvedItems['숫자 세기 놀이'].includes(i));
        if (availableItems.length === 0) {
            showCompletionScreen('숫자 세기 놀이');
            return;
        }

        targetItem = availableItems[Math.floor(Math.random() * availableItems.length)];
        targetNumber = Math.floor(Math.random() * 20) + 1;
        placedItemsCount = 0;

        const gameArea = document.getElementById('game-area');
        gameArea.innerHTML = `
            <div class="options-bar">
                <label><input type="checkbox" checked onchange="soundEnabled = this.checked"> 수 세는 소리</label>
                <label><input type="radio" name="sndType" value="고유어" checked onchange="soundType = this.value"> 고유어</label>
                <label><input type="radio" name="sndType" value="한자어" onchange="soundType = this.value"> 한자어</label>
            </div>
            
            <div class="question-text" onclick="replayQuestion()">
                ${targetItem} ${targetNumber}개 줄래?
            </div>

            <div id="drop-zone" onclick="placeItem()"></div>

            <div class="items-tray">
                ${availableItems.map(item => `
                    <img src="images/${item}.png" class="draggable-item" alt="${item}" onclick="selectItem('${item}')" onerror="this.src=''">
                `).join('')}
            </div>

            <button class="submit-btn" onclick="checkCountingAnswer()">전달</button>
        `;

        playSoundSequence([`${targetItem}.wav`, `${targetNumber}개줄래.wav`]);
    }

    let selectedItemForPlacement = null;

    function selectItem(itemName) {
        selectedItemForPlacement = itemName;
        document.getElementById('drop-zone').style.cursor = `url('images/${itemName}.png') 30 30, pointer`;
    }

    function placeItem() {
        if (!selectedItemForPlacement || placedItemsCount >= 20) return;
        
        placedItemsCount++;
        const dropZone = document.getElementById('drop-zone');
        const img = document.createElement('img');
        img.src = `images/${selectedItemForPlacement}.png`;
        img.className = 'placed-item';
        img.oncontextmenu = (e) => { e.preventDefault(); removePlacedItem(img); };
        dropZone.appendChild(img);

        if (soundEnabled) {
            let numStr = soundType === "고유어" ? koreanNumbers[placedItemsCount] : sinoNumbers[placedItemsCount];
            playSound(`${numStr}.wav`);
        }
    }

    function removePlacedItem(imgElement) {
        if (placedItemsCount > 0) {
            imgElement.remove();
            placedItemsCount--;
        }
    }

    function replayQuestion() {
        playSoundSequence([`${targetItem}.wav`, `${targetNumber}개줄래.wav`]);
    }

    function checkCountingAnswer() {
        const dropZoneItems = document.getElementById('drop-zone').children;
        let isCorrect = true;

        if (dropZoneItems.length !== targetNumber) isCorrect = false;
        
        for (let img of dropZoneItems) {
            if (!img.src.includes(targetItem)) {
                isCorrect = false;
                break;
            }
        }

        if (isCorrect) {
            playSound('고마워.wav');
            solvedItems['숫자 세기 놀이'].push(targetItem);
            updateBanner();
            setTimeout(initCountingGame, 2000);
        } else {
            playSound('다시해보자.wav');
            document.querySelector('.question-text').innerText = "다시 해보자.";
            setTimeout(() => {
                document.querySelector('.question-text').innerText = `${targetItem} ${targetNumber}개 줄래?`;
                document.getElementById('drop-zone').innerHTML = '';
                placedItemsCount = 0;
            }, 2000);
        }
    }

    function updateBanner() {
        const banner = document.getElementById('banner-frame');
        banner.innerHTML = '';
        const currentSolved = solvedItems[currentGame] || [];
        
        currentSolved.forEach(item => {
            const div = document.createElement('div');
            div.className = 'banner-item';
            div.style.backgroundImage = `url('images/${item}.png')`;
            banner.appendChild(div);
        });
    }

    function showCompletionScreen(gameName) {
        const gameArea = document.getElementById('game-area');
        gameArea.innerHTML = `
            <h1 style="font-size: 4cqw; color: black;">다 했어. 고마워!</h1>
            <p style="font-size: 2cqw; color: blue;">🎉 ${gameName} 마스터! 🎉</p>
        `;
        playSound('다했어고마워.wav');

        const buttons = document.querySelectorAll('.menu-btn');
        buttons.forEach(btn => {
            if(btn.innerText.includes(gameName)) btn.classList.add('completed');
        });
    }

    // ==========================================
    // 4. 모바일 뷰포트 크기 변경(가로/세로 전환) 감지
    // ==========================================
    let resizeTimer;

    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);

        resizeTimer = setTimeout(() => {
            const appContainer = document.getElementById('app-container');
            if (appContainer) {
                // 강제 리플로우를 통해 이전 크기의 잔재를 지우고 새로운 크기로 화면을 갱신합니다.
                appContainer.style.display = 'none';
                void appContainer.offsetHeight;
                appContainer.style.display = 'grid';
                console.log("레이아웃이 성공적으로 갱신되었습니다.");
            }
        }, 250);
    });
</script>

</body>
</html>
